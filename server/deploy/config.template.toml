# Pulse Relay Server — generated by setup.sh
# Edit this file at /opt/pulse/config.toml

[server]
listen = "__LISTEN__"
data_dir = "/opt/pulse/data"
tls_mode = "__TLS_MODE__"
auto_tls_domain = "__DOMAIN__"

[auth]
mode = "__AUTH_MODE__"

[storage]
message_ttl_hours = 168
max_message_bytes = 536870912
max_backup_bytes = 52428800
max_file_bytes = 104857600
max_storage_per_user = 1073741824
file_ttl = "168h"

[turn]
enabled = true
port = 3478
realm = "__DOMAIN__"

[media]
enabled = true
mode = "stealth"
max_room_size = 25
last_n_video = 6
simulcast = true
speaker_detect = true
speaker_threshold = -40

[privacy]
preset = "paranoid"
access_log = false
delete_on_ack = true
store_client_ip = false
strip_forwarded_headers = true

[limits]
messages_per_minute = 60
signals_per_minute = 120
max_connections = 1000
max_rooms = 100
pow_difficulty = 16

[federation]
mode = "disabled"
max_hops = 2

[decoy]
server_header = "nginx/1.24.0"

[tunnel]
enabled = false
