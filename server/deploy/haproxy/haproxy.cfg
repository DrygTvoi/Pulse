# L4 protocol multiplexer for :443 — distinguishes between TLS traffic
# (forwarded to nginx, so JA3S stays identical to vanilla nginx) and
# STUN/TURN traffic (forwarded straight to pulse). Lets one public port
# carry both HTTPS/WSS and TURN-over-TCP, which is what clients on a
# restrictive network (GFW, corporate, airport wifi) actually need.
#
# Detection: `ssl_hello_type 1` matches a TLS ClientHello (0x16 0x03 ...).
# Everything else — including STUN's fixed 0x2112A442 magic cookie and
# TURN channel data frames — goes to the TURN backend.

global
    log stdout format raw local0 info
    maxconn 4096
    # Never serve HAProxy's own error/info pages on the mux port — they
    # would leak "HAProxy" as a banner.
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client  1h
    timeout server  1h
    option tcplog
    # `init-addr last,libc,none` lets HAProxy start even if upstream
    # DNS names (nginx / pulse) aren't yet resolvable — it retries in
    # the background instead of exiting at boot. Without this any cold
    # start would hit a race with Docker's embedded DNS.
    default-server init-addr last,libc,none resolvers docker

resolvers docker
    # Docker's embedded DNS runs at 127.0.0.11 inside every user network.
    nameserver docker_embedded 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid     10s
    hold other     10s
    hold refused   10s
    hold nx        10s
    hold timeout   10s
    hold obsolete  10s

# ─── :443 multiplexer ──────────────────────────────────────────────────

frontend fe_443
    bind :443
    mode tcp
    option tcplog

    # Give the client up to 3 seconds to send something. If they're silent,
    # fall through to TURN (real TURN clients send right away; silent
    # probers get black-holed by the TURN server's own auth requirement).
    tcp-request inspect-delay 3s
    tcp-request content accept if { req.ssl_hello_type 1 }
    tcp-request content accept if !HTTP

    use_backend be_nginx if { req.ssl_hello_type 1 }
    default_backend be_turn

backend be_nginx
    mode tcp
    # Preserve client IP via PROXY protocol v2 so nginx can log / rate-limit
    # per real source instead of the HAProxy container IP.
    server nginx nginx:8443 send-proxy-v2 check

backend be_turn
    mode tcp
    server pulse_turn pulse:3478 check

# ─── :80 → unchanged, straight to nginx for ACME + HTTPS redirect ──────

frontend fe_80
    bind :80
    mode tcp
    default_backend be_nginx_http

backend be_nginx_http
    mode tcp
    server nginx nginx:80 check
